name: Smoke tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  manifest:
    name: validate manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: validate JSON syntax
        run: |
          jq empty .claude-plugin/plugin.json
          jq empty .claude-plugin/marketplace.json
          jq empty .mcp.json
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - name: install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: claude plugin validate (plugin manifest)
        run: claude plugin validate .claude-plugin/plugin.json
      - name: claude plugin validate (marketplace manifest)
        run: claude plugin validate .claude-plugin/marketplace.json

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck tests/
        run: shellcheck -x tests/*.sh

  cross-platform:
    name: ${{ matrix.os }} cross-platform smokes
    needs: [manifest, shellcheck]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: git-mount-gitignore
        run: bash tests/git-mount-gitignore.sh
      - name: snapshot-fallback (skips without strata CLI installed)
        run: bash tests/snapshot-fallback.sh
      - name: unmount-lifecycle (skips without strata CLI installed)
        run: bash tests/unmount-lifecycle.sh
      - name: permission-denied (skips without strata CLI installed)
        run: bash tests/permission-denied.sh
      - name: doctor-linux-fuse-probe (skips off Linux)
        run: bash tests/doctor-linux-fuse-probe.sh
